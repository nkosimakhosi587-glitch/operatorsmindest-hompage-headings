<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animated Headings</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #fff;
      font-family: 'Roboto', sans-serif;
    }

    .heading-container {
      position: relative;
      width: 80%;
      height: 50px;
      overflow: hidden;
    }

    .heading {
      position: absolute;
      width: 100%;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      color: #000;
      opacity: 0;
      animation-duration: 8s;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
    }

    /* First heading: center → right */
    .heading:nth-child(1) {
      animation-name: slideRight;
    }

    /* Second heading: left → center */
    .heading:nth-child(2) {
      animation-name: slideLeft;
      animation-delay: 8s;
    }

    /* Third heading: center → right again */
    .heading:nth-child(3) {
      animation-name: slideRight;
      animation-delay: 16s;
    }

    @keyframes slideRight {
      0% { transform: translateX(0); opacity: 1; }
      30% { transform: translateX(50%); opacity: 1; }
      40% { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes slideLeft {
      0% { transform: translateX(-50%); opacity: 0; }
      10% { transform: translateX(0); opacity: 1; }
      40% { transform: translateX(0); opacity: 1; }
      70% { transform: translateX(50%); opacity: 0; }
      100% { opacity: 0; }

</head>
<body>
  <div class="heading-container">
    <div class="heading">Building an Operating System for Your Work</div>
    <div class="heading">For the operator who has tried everything else</div>
    <div class="heading">Let this System run your work</div>
  </div>
</body>
</html>
