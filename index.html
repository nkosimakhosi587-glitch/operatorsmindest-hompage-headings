<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sliding · operating system for your work</title>
  <!-- Roboto Bold 18 · black, slide right & reappear left every 3s -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">
  <style>
    /* reset & base – so the heading sits flush left, no scrollbars */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f2f4f6; /* subtle background to see the slide clearly, not required */
      min-height: 100vh;
      display: flex;
      align-items: center; /* vertical centering (optional, keeps it visible) */
      overflow-x: hidden; /* hides the text while it's off-screen right */
      margin: 0;
      padding: 0;
    }

    /* main sliding container – holds the three lines, moves as a single unit */
    .os-slider {
      /* block + full width possible, but we reset children so text starts at left edge */
      display: block;
      width: 100%;
      font-family: 'Roboto', sans-serif;
      font-weight: 700; /* Roboto Bold */
      font-size: 18px;
      color: #000000; /* pure black */
      line-height: 1.4; /* comfortable reading */

      /* remove any default spacing that could push text away from left edge */
      margin: 0;
      padding: 0;

      /* animation: slide right off-screen in 3s, then instantly reappear left */
      animation: slideOffAndBack 3s linear infinite;

      /* optional subtle background to emphasize the block – remove if you want */
      background-color: transparent;
    }

    /* each text line – no margins, no padding, so they really start at left:0 */
    .os-slider p {
      margin: 0;
      padding: 0;
      /* keep block behaviour – each on its own line */
      width: 100%;
      white-space: nowrap; /* prevent wrapping inside each line (keeps exact text) */
    }

    /* add tiny breathing space between lines – purely optical, no left offset */
    .os-slider p + p {
      margin-top: 0.2em; /* minimal gap between lines, still left aligned */
    }

    /* keyframes: from left edge (0) to completely off right (100vw) */
    @keyframes slideOffAndBack {
      0% {
        transform: translateX(0); /* start exactly at left edge */
      }
      100% {
        transform: translateX(100vw); /* move right by full viewport width -> hidden */
      }
    }

    /* small screen fine-tuning: keep text crisp */
    @media (max-width: 600px) {
      .os-slider {
        font-size: 18px; /* still 18px, Roboto Bold */
      }
    }

    /* (optional) visual touch: light border to see left edge start */
    /* you can remove this part if you don't need a marker */
    .os-slider p {
      border-left: 2px solid rgba(0,0,0,0.1); /* very faint left mark – just to show reset */
      padding-left: 2px; /* tiny space so the line isn't glued */
    }
    /* fix: the border shouldn't affect sliding or left edge */
    .os-slider p {
      border-left: none; /* i prefer clean left – remove if you liked the marker */
    }
    /* i'll keep it minimal: no border, text flush left */
  </style>
</head>
<body>
  <!-- sliding block: contains the three headline rows -->
  <div class="os-slider">
    <p>Building an Operating System for Your Work</p>
    <p>For the operator who has tried everything else</p>
    <p>Let this System run your work</p>
  </div>

  <!-- note: the text slides from left edge to right off-screen in exactly 3 seconds,
       then instantly reappears on the left side (transform resets to 0) and repeats.
       Font is Roboto bold 18px, black, as requested. No external javascript, pure CSS. -->
</body>
</html>
