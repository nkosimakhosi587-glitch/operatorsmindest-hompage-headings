<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sliding Headings</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #fff;
      margin: 0;
      font-family: 'Roboto', sans-serif;
    }

    .slider {
      position: relative;
      width: 600px;
      height: 30px;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      width: 100%;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      color: #000;
      opacity: 0;
      animation: slideAnimation 12s ease-in-out infinite;
    }

    .slide:nth-child(1) {
      animation-delay: 0s;
    }
    .slide:nth-child(2) {
      animation-delay: 4s;
    }
    .slide:nth-child(3) {
      animation-delay: 8s;
    }

    @keyframes slideAnimation {
      0% { transform: translateX(-100%); opacity: 0; }
      10% { transform: translateX(0); opacity: 1; }
      25% { transform: translateX(0); opacity: 1; }
      35% { transform: translateX(100%); opacity: 0; }
      100% { transform: translateX(100%); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="slider">
    <div class="slide">Building an Operating System for Your Work</div>
    <div class="slide">For the operator who has tried everything else</div>
    <div class="slide">Let this System run your work</div>
  </div>
</body>
</html>
