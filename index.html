<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sliding Headings</title>
  <!-- Google Fonts: Roboto Bold -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 200px;
      overflow: hidden;
      background-color: white;
      position: relative;
    }

    h1 {
      position: absolute;
      font-size: 18px;      /* 18px */
      font-weight: 900;     /* Roboto Black */
      color: black;
      text-align: center;
      opacity: 0;           /* Hidden by default */
    }

    /* Slide animation */
    @keyframes slideRightLeft {
      0% { left: -100%; opacity: 0; }
      10% { left: 50%; transform: translateX(-50%); opacity: 1; }
      40% { left: 50%; transform: translateX(-50%); opacity: 1; }
      50% { left: 110%; opacity: 0; }
      100% { left: -100%; opacity: 0; }
    }

    /* Each heading gets a delay to loop one after another */
    #heading1 { animation: slideRightLeft 9s infinite; animation-delay: 0s; }
    #heading2 { animation: slideRightLeft 9s infinite; animation-delay: 3s; }
    #heading3 { animation: slideRightLeft 9s infinite; animation-delay: 6s; }

  </style>
</head>
<body>

  <h1 id="heading1">Build an Operating System for Your Work</h1>
  <h1 id="heading2">For the Operator Who Has Tried Everything Else</h1>
  <h1 id="heading3">Let This System Run Your Work</h1>

</body>
</html>
